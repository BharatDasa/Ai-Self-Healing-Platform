apiVersion: v1
kind: Service

metadata:
  name: fraud-service
  namespace: ai-platform

  labels:
    app: fraud
    release: monitoring

spec:
  selector:
    app: fraud

  ports:
    - name: http
      port: 8000
      targetPort: 8000

    - name: metrics
      port: 8001
      targetPort: 8001

  type: ClusterIP
