apiVersion: apps/v1
kind: Deployment

metadata:
  name: transaction-simulator
  namespace: ai-platform

spec:
  replicas: 1

  selector:
    matchLabels:
      app: simulator

  template:
    metadata:
      labels:
        app: simulator

    spec:
      containers:
        - name: simulator

          image: bharatdasa/transaction-simulator:v1

          imagePullPolicy: Always

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"
