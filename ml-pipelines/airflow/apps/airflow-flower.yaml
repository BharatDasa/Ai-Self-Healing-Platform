apiVersion: apps/v1
kind: Deployment

metadata:
  name: airflow-flower
  namespace: airflow

spec:
  replicas: 1

  selector:
    matchLabels:
      app: airflow-flower

  template:

    metadata:
      labels:
        app: airflow-flower

    spec:

      nodeSelector:
        workload: app

      containers:

        - name: airflow-flower

          image: bharatdasa/enterprise-airflow:latest

          imagePullPolicy: Always

          args:
            - celery
            - flower

          ports:
            - containerPort: 5555

          envFrom:

            - secretRef:
                name: airflow-secret

            - configMapRef:
                name: airflow-config

          volumeMounts:

            # =====================================================
            # AIRFLOW LOGS
            # =====================================================

            - name: logs-storage
              mountPath: /opt/airflow/logs

            # =====================================================
            # SHARED NFS MLOPS STORAGE
            # =====================================================

            - name: dags-storage
              mountPath: /opt/airflow/dags/ml-pipelines

      volumes:

        # =====================================================
        # SHARED NFS DAGS / SCRIPTS / MODELS / ANALYTICS
        # =====================================================

        - name: dags-storage
          persistentVolumeClaim:
            claimName: airflow-dags-pvc

        # =====================================================
        # SHARED LOG STORAGE
        # =====================================================

        - name: logs-storage
          persistentVolumeClaim:
            claimName: airflow-logs-pvc
