apiVersion: apps/v1
kind: Deployment

metadata:
  name: airflow-scheduler
  namespace: airflow

spec:

  replicas: 1

  selector:
    matchLabels:
      app: airflow-scheduler

  template:

    metadata:
      labels:
        app: airflow-scheduler

    spec:

      nodeSelector:
        workload: app

      containers:

        - name: airflow-scheduler

          image: bharatdasa/enterprise-airflow:latest

          imagePullPolicy: Always

          args:
            - scheduler

          envFrom:

            - secretRef:
                name: airflow-secret

            - configMapRef:
                name: airflow-config

          volumeMounts:

            # =====================================================
            # AIRFLOW LOGS
            # =====================================================

            - name: logs-storage
              mountPath: /opt/airflow/logs

            # =====================================================
            # SHARED NFS MLOPS STORAGE
            # =====================================================

            - name: dags-storage
              mountPath: /opt/airflow/dags/ml-pipelines

      volumes:

        # =====================================================
        # SHARED NFS STORAGE
        # =====================================================

        - name: dags-storage
          persistentVolumeClaim:
            claimName: airflow-dags-pvc

        # =====================================================
        # AIRFLOW LOG STORAGE
        # =====================================================

        - name: logs-storage
          persistentVolumeClaim:
            claimName: airflow-logs-pvc
